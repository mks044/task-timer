<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Timer</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=3">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png?v=3">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=3">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=3">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1a1a1f">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-2: #1a1a26;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --text-dim: #8888a0;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --green: #22c55e;
      --green-glow: rgba(34, 197, 94, 0.3);
      --orange: #f59e0b;
      --orange-glow: rgba(245, 158, 11, 0.3);
      --red: #ef4444;
      --break-color: #06b6d4;
      --break-glow: rgba(6, 182, 212, 0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header .stats {
      display: flex;
      gap: 20px;
      font-size: 13px;
      color: var(--text-dim);
    }

    header .stats span strong {
      color: var(--text);
    }

    /* Active Timer Banner */
    .active-timer-banner {
      display: none;
      background: var(--surface);
      border: 1px solid var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 24px;
      text-align: center;
    }

    .active-timer-banner.active { display: block; }
    .active-timer-banner.on-break { border-color: var(--break-color); box-shadow: 0 0 20px var(--break-glow); }

    .active-timer-banner .timer-task-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .active-timer-banner .timer-display {
      font-size: 56px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .active-timer-banner .timer-allocated {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    .active-timer-banner .timer-controls {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .timer-progress-bar {
      width: 100%;
      height: 4px;
      background: var(--surface-2);
      border-radius: 2px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .timer-progress-bar .fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 1s linear;
    }

    .active-timer-banner.on-break .timer-progress-bar .fill { background: var(--break-color); }
    .active-timer-banner.overtime .timer-display { color: var(--red); }
    .active-timer-banner.overtime .timer-progress-bar .fill { background: var(--red); }

    /* Buttons */
    button {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    button:hover { background: var(--border); }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    button.primary:hover { opacity: 0.9; }

    button.danger { color: var(--red); }
    button.danger:hover { background: rgba(239, 68, 68, 0.1); }

    button.complete-btn { color: var(--green); }
    button.complete-btn:hover { background: rgba(34, 197, 94, 0.1); }

    /* Sections */
    .section {
      margin-bottom: 28px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .section-header h2 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
    }

    .section-header .count {
      font-size: 12px;
      color: var(--text-dim);
      background: var(--surface-2);
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* Task Cards */
    .task-list { display: flex; flex-direction: column; gap: 6px; }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.15s;
    }

    .task-card:hover { border-color: #3a3a4a; }
    .task-card.is-break { border-left: 3px solid var(--break-color); }
    .task-card.running { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

    .task-card .task-info { flex: 1; min-width: 0; }

    .task-card .task-name {
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-card .task-meta {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
      display: flex;
      gap: 12px;
    }

    .task-card .task-time-badge {
      background: var(--surface-2);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .task-card .task-actions {
      display: flex;
      gap: 6px;
    }

    .task-card .task-actions button {
      padding: 6px 10px;
      font-size: 12px;
    }

    .task-card.completed-card {
      opacity: 0.5;
    }

    .task-card.completed-card .task-name {
      text-decoration: line-through;
    }

    /* Add Task Form */
    .add-task-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }

    .add-task-bar input, .add-task-bar select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    .add-task-bar input:focus, .add-task-bar select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .add-task-bar input[type="text"] { flex: 1; }
    .add-task-bar select { width: 120px; }

    option { background: var(--surface); }

    /* Time Picker */
    .time-picker-row {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      align-items: center;
      flex-wrap: wrap;
    }

    .time-picker-row .label {
      font-size: 12px;
      color: var(--text-dim);
      margin-right: 4px;
    }

    .time-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 5px 12px;
      border-radius: 16px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .time-chip:hover { border-color: #4a4a5a; color: var(--text); }
    .time-chip.selected { background: var(--accent); border-color: var(--accent); color: white; }

    .time-picker-row input[type="number"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 8px;
      border-radius: 8px;
      font-size: 13px;
      width: 56px;
      text-align: center;
      font-family: inherit;
    }

    .time-picker-row input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Inline edit */
    .task-card .task-name.editing,
    .task-card .task-time-badge.editing {
      background: var(--surface-2);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 2px 6px;
      outline: none;
      min-width: 40px;
    }

    .task-card .task-name { cursor: text; }
    .task-card .task-time-badge { cursor: pointer; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 32px;
      color: var(--text-dim);
      font-size: 14px;
    }

    /* Completed section toggle */
    .toggle-completed {
      cursor: pointer;
      user-select: none;
    }

    .toggle-completed:hover { color: var(--text); }

    /* Drag hint */
    .task-card .drag-handle {
      cursor: grab;
      color: var(--text-dim);
      font-size: 14px;
      padding: 0 4px;
    }

    .task-card .drag-handle:active { cursor: grabbing; }
    .task-card.dragging { opacity: 0.4; }
    .task-card.drag-over { border-color: var(--accent); }

    /* Notes indicator */
    .notes-indicator {
      color: var(--accent);
      font-size: 11px;
      margin-left: 4px;
    }

    /* Inline notes drawer */
    .task-card-wrapper {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color 0.15s;
    }
    .task-card-wrapper:hover { border-color: #3a3a4a; }
    .task-card-wrapper.is-break { border-left: 3px solid var(--break-color); }
    .task-card-wrapper.running { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
    .task-card-wrapper.completed-card { opacity: 0.5; }
    .task-card-wrapper.completed-card .task-name { text-decoration: line-through; }

    .task-card-wrapper .task-card {
      background: transparent;
      border: none;
      box-shadow: none;
    }
    .task-card-wrapper .task-card:hover { border: none; }

    .task-notes-drawer {
      display: none;
      padding: 0 16px 14px 16px;
      border-top: 1px solid var(--border);
      margin-top: -2px;
    }
    .task-card-wrapper.notes-open .task-notes-drawer { display: block; padding-top: 12px; }
    .task-notes-drawer textarea {
      width: 100%;
      min-height: 120px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
    }
    .task-notes-drawer textarea:focus { outline: none; border-color: var(--accent); }

    /* Responsive */
    @media (max-width: 600px) {
      .add-task-bar { flex-wrap: wrap; }
      .add-task-bar input[type="text"] { width: 100%; }
      header { flex-direction: column; gap: 12px; align-items: flex-start; }
      .active-timer-banner .timer-display { font-size: 40px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Task Timer</h1>
      <div class="stats">
        <span>Today: <strong id="stat-total">0h 0m</strong></span>
        <span>Tasks done: <strong id="stat-done">0</strong></span>
      </div>
    </header>

    <!-- Active Timer -->
    <div class="active-timer-banner" id="active-timer">
      <div class="timer-task-name" id="timer-task-name"></div>
      <div class="timer-display" id="timer-display">00:00</div>
      <div class="timer-progress-bar"><div class="fill" id="timer-progress"></div></div>
      <div class="timer-allocated" id="timer-allocated"></div>
      <div class="timer-controls">
        <button id="timer-pause-btn" onclick="togglePause()">Pause</button>
        <button class="complete-btn" onclick="completeActive()">Complete</button>
        <button class="danger" onclick="stopTimer()">Stop</button>
      </div>
    </div>

    <!-- Add Task -->
    <div class="add-task-bar">
      <input type="text" id="task-name-input" placeholder="Task name..." onkeydown="if(event.key==='Enter')addTask()">
      <select id="task-type-input">
        <option value="task">Task</option>
        <option value="break">Break</option>
      </select>
      <button class="primary" onclick="addTask()">Add</button>
    </div>
    <div class="time-picker-row">
      <span class="label">Time:</span>
      <button class="time-chip" onclick="pickTime(5,this)">5m</button>
      <button class="time-chip" onclick="pickTime(10,this)">10m</button>
      <button class="time-chip" onclick="pickTime(15,this)">15m</button>
      <button class="time-chip selected" onclick="pickTime(25,this)">25m</button>
      <button class="time-chip" onclick="pickTime(45,this)">45m</button>
      <button class="time-chip" onclick="pickTime(60,this)">1h</button>
      <button class="time-chip" onclick="pickTime(90,this)">1.5h</button>
      <button class="time-chip" onclick="pickTime(120,this)">2h</button>
      <span class="label" style="margin-left:8px">or</span>
      <input type="number" id="custom-minutes" placeholder="min" min="1" onfocus="clearChipSelection()" oninput="selectedMinutes=parseInt(this.value)||25">
    </div>

    <!-- Scheduled -->
    <div class="section">
      <div class="section-header">
        <h2>Scheduled</h2>
        <span class="count" id="scheduled-count">0</span>
      </div>
      <div class="task-list" id="scheduled-list"></div>
    </div>

    <!-- Backlog -->
    <div class="section">
      <div class="section-header">
        <h2>Backlog</h2>
        <span class="count" id="backlog-count">0</span>
      </div>
      <div class="task-list" id="backlog-list"></div>
    </div>

    <!-- Completed -->
    <div class="section">
      <div class="section-header">
        <h2 class="toggle-completed" onclick="toggleCompleted()">Completed <span id="completed-arrow">+</span></h2>
        <span class="count" id="completed-count">0</span>
      </div>
      <div class="task-list" id="completed-list" style="display:none"></div>
    </div>
  </div>


<script>
// ---- State ----
const _seed = [{"id": "mnnw1djidmdm", "name": "Complete Outlier onboarding", "minutes": 15, "type": "task", "status": "completed", "timeSpent": 0, "createdAt": 1775522137806, "completedAt": 1775547237937}, {"id": "mnnw1djit1xx", "name": "Send Diane invoice #4 (3 hours)", "minutes": 10, "type": "task", "status": "completed", "timeSpent": 0, "createdAt": 1775522137806, "completedAt": 1775549194182}, {"id": "mnnw1djidmtp", "name": "Call Apple Developer Support \u2014 cancel stuck banking update", "minutes": 15, "type": "task", "status": "completed", "timeSpent": 0, "createdAt": 1775522137806, "completedAt": 1775562848385}, {"id": "mnnw1dji6uap", "name": "Check Utah University portal \u2014 FAFSA, deposit, orientation deadlines", "minutes": 20, "type": "task", "status": "completed", "timeSpent": 0, "createdAt": 1775522137806, "completedAt": 1776581965065}, {"id": "mnnw1djiisuw", "name": "Design HabitForge App Store screenshots", "minutes": 60, "type": "task", "status": "backlog", "timeSpent": 0, "createdAt": 1775522137806, "completedAt": null}, {"id": "mnnw1dji5tnw", "name": "Create + post first TikTok", "minutes": 45, "type": "task", "status": "backlog", "timeSpent": 0, "createdAt": 1775522137806, "completedAt": null}, {"id": "mnnw1djivcib", "name": "Stellar Hackathon \u2014 register + review Drew's submission", "minutes": 30, "type": "task", "status": "completed", "timeSpent": 4525, "createdAt": 1775522137806, "completedAt": 1775808659308, "notes": "- submission reviewed - waiting on drew for info "}, {"id": "mnof9amk32c6", "name": "Check \u043a\u0440\u043e\u043b portal for Terra status", "minutes": 10, "type": "task", "status": "completed", "timeSpent": 8417, "createdAt": 1775554419980, "completedAt": 1775562840517}, {"id": "mnof9hw6aea4", "name": "Last car for sale", "minutes": 25, "type": "task", "status": "completed", "timeSpent": 0, "createdAt": 1775554429398, "completedAt": 1775561853319}, {"id": "mnoka82zlhcr", "name": "Pay for internet.", "minutes": 25, "type": "task", "status": "completed", "timeSpent": 0, "createdAt": 1775562861419, "completedAt": 1775635500441}, {"id": "mnokas3yis15", "name": "PSNG call", "minutes": 25, "type": "task", "status": "completed", "timeSpent": 0, "createdAt": 1775562887374, "completedAt": 1775799212543}, {"id": "mnold2hsntv4", "name": "Get the money.", "minutes": 25, "type": "task", "status": "completed", "timeSpent": 0, "createdAt": 1775564673760, "completedAt": 1775635503041}, {"id": "mnsh0jerv1tp", "name": "Hackathon Submission", "minutes": 60, "type": "task", "status": "completed", "timeSpent": 9364, "createdAt": 1775799235395, "completedAt": 1775808642964}, {"id": "mo5f1mfzx9pa", "name": "Transfer Habit Forge app to new Apple account.", "minutes": 120, "type": "task", "status": "scheduled", "timeSpent": 0, "createdAt": 1776581987039, "completedAt": null}];
if (!localStorage.getItem('taskTimerTasks')) localStorage.setItem('taskTimerTasks', JSON.stringify(_seed));
let tasks = JSON.parse(localStorage.getItem('taskTimerTasks'));


let activeTaskId = null;
let timerInterval = null;
let timerElapsed = 0; // seconds
let timerPaused = false;
let showCompleted = false;

// ---- Persistence ----
function save() {
  localStorage.setItem('taskTimerTasks', JSON.stringify(tasks));
}

// ---- Time Picker ----
let selectedMinutes = 25;

function pickTime(min, el) {
  selectedMinutes = min;
  document.querySelectorAll('.time-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('custom-minutes').value = '';
}

function clearChipSelection() {
  document.querySelectorAll('.time-chip').forEach(c => c.classList.remove('selected'));
}

// ---- Task CRUD ----
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function addTask() {
  const nameEl = document.getElementById('task-name-input');
  const typeEl = document.getElementById('task-type-input');

  const name = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }

  const customMin = parseInt(document.getElementById('custom-minutes').value);
  const minutes = customMin > 0 ? customMin : selectedMinutes;
  const type = typeEl.value;

  tasks.push({
    id: genId(),
    name: type === 'break' ? (name || 'Break') : name,
    minutes,
    type,
    status: 'scheduled',
    timeSpent: 0,
    createdAt: Date.now(),
    completedAt: null,
  });

  nameEl.value = '';
  document.getElementById('custom-minutes').value = '';
  typeEl.value = 'task';
  nameEl.focus();
  save();
  render();
}

// ---- Inline Editing ----
function disableDragOnCard(el) {
  const card = el.closest('.task-card');
  if (card) card.setAttribute('draggable', 'false');
}

function enableDragOnCard(el) {
  const card = el.closest('.task-card');
  if (card) card.setAttribute('draggable', 'true');
}

function editTaskName(id, el) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  disableDragOnCard(el);
  el.contentEditable = true;
  el.classList.add('editing');
  // Use setTimeout so the browser fully switches to editable mode
  setTimeout(() => {
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false); // cursor at end
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  }, 0);

  function finish() {
    el.contentEditable = false;
    el.classList.remove('editing');
    enableDragOnCard(el);
    const newName = el.textContent.trim();
    if (newName && newName !== t.name) {
      t.name = newName;
      save();
    }
    el.onblur = null;
    el.onkeydown = null;
    el.onmousedown = null;
    render();
  }

  el.onblur = finish;
  el.onkeydown = (e) => {
    e.stopPropagation();
    if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    if (e.key === 'Escape') { el.textContent = t.name; el.blur(); }
  };
  el.onmousedown = (e) => e.stopPropagation();
}

function editTaskTime(id, el) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;

  const orig = el.textContent;
  disableDragOnCard(el);
  el.contentEditable = true;
  el.classList.add('editing');
  el.textContent = t.minutes;
  setTimeout(() => {
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  }, 0);

  function finish() {
    el.contentEditable = false;
    el.classList.remove('editing');
    enableDragOnCard(el);
    const val = parseInt(el.textContent);
    if (val > 0 && val !== t.minutes) {
      t.minutes = val;
      save();
    }
    el.onblur = null;
    el.onkeydown = null;
    el.onmousedown = null;
    render();
    if (activeTaskId === id) updateTimerBanner();
  }

  el.onblur = finish;
  el.onkeydown = (e) => {
    e.stopPropagation();
    if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    if (e.key === 'Escape') { el.textContent = orig; el.blur(); }
    if (e.key.length === 1 && !/\d/.test(e.key)) e.preventDefault();
  };
  el.onmousedown = (e) => e.stopPropagation();
}

function deleteTask(id) {
  if (activeTaskId === id) stopTimer();
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function moveToBacklog(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.status = 'backlog'; save(); render(); }
}

function moveToScheduled(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.status = 'scheduled'; save(); render(); }
}

function completeTask(id) {
  if (activeTaskId === id) stopTimer();
  const t = tasks.find(t => t.id === id);
  if (t) { t.status = 'completed'; t.completedAt = Date.now(); save(); render(); }
}

// ---- Notes ----
let openNotesIds = new Set();

function toggleNotes(id) {
  if (openNotesIds.has(id)) openNotesIds.delete(id);
  else openNotesIds.add(id);
  render();
  if (openNotesIds.has(id)) {
    setTimeout(() => {
      const ta = document.getElementById(`notes-${id}`);
      if (ta) ta.focus();
    }, 0);
  }
}

function updateNotes(id, value) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.notes = value; save(); }
}

function uncompleteTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.status = 'scheduled'; t.completedAt = null; save(); render(); }
}

// ---- Timer ----
function startTimer(id) {
  if (activeTaskId) stopTimer();
  const t = tasks.find(t => t.id === id);
  if (!t) return;

  activeTaskId = id;
  timerElapsed = t.timeSpent || 0;
  timerPaused = false;

  updateTimerBanner();

  timerInterval = setInterval(() => {
    if (!timerPaused) {
      timerElapsed++;
      t.timeSpent = timerElapsed;
      if (timerElapsed % 10 === 0) save(); // save every 10s
      updateTimerBanner();
    }
  }, 1000);

  render();
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  const t = tasks.find(t => t.id === activeTaskId);
  if (t) t.timeSpent = timerElapsed;
  activeTaskId = null;
  timerInterval = null;
  timerElapsed = 0;
  timerPaused = false;
  save();
  render();
  updateTimerBanner();
}

function togglePause() {
  timerPaused = !timerPaused;
  document.getElementById('timer-pause-btn').textContent = timerPaused ? 'Resume' : 'Pause';
}

function completeActive() {
  if (activeTaskId) {
    const id = activeTaskId;
    stopTimer();
    completeTask(id);
  }
}

function updateTimerBanner() {
  const banner = document.getElementById('active-timer');
  if (!activeTaskId) {
    banner.classList.remove('active');
    document.title = 'Task Timer';
    return;
  }

  const t = tasks.find(t => t.id === activeTaskId);
  if (!t) return;

  banner.classList.add('active');
  banner.classList.toggle('on-break', t.type === 'break');

  const allocated = t.minutes * 60;
  const overtime = timerElapsed > allocated;
  banner.classList.toggle('overtime', overtime);

  document.getElementById('timer-task-name').textContent = t.name;
  document.getElementById('timer-display').textContent = formatTime(timerElapsed);
  document.getElementById('timer-allocated').textContent = overtime
    ? `Over by ${formatTime(timerElapsed - allocated)} (allocated ${t.minutes}m)`
    : `${formatTime(allocated - timerElapsed)} remaining of ${t.minutes}m`;

  const pct = Math.min((timerElapsed / allocated) * 100, 100);
  document.getElementById('timer-progress').style.width = pct + '%';

  // Update page title with timer
  document.title = `${formatTime(timerElapsed)} - ${t.name}`;
}

// ---- Drag & Drop (reorder scheduled) ----
let dragId = null;

function onDragStart(e, id) {
  dragId = id;
  e.target.closest('.task-card').classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragEnd(e) {
  dragId = null;
  document.querySelectorAll('.task-card').forEach(c => c.classList.remove('dragging', 'drag-over'));
}

function onDragOver(e, id) {
  e.preventDefault();
  if (id !== dragId) e.target.closest('.task-card').classList.add('drag-over');
}

function onDragLeave(e) {
  e.target.closest('.task-card')?.classList.remove('drag-over');
}

function onDrop(e, targetId) {
  e.preventDefault();
  document.querySelectorAll('.task-card').forEach(c => c.classList.remove('drag-over'));
  if (!dragId || dragId === targetId) return;

  const scheduled = tasks.filter(t => t.status === 'scheduled');
  const fromIdx = scheduled.findIndex(t => t.id === dragId);
  const toIdx = scheduled.findIndex(t => t.id === targetId);
  if (fromIdx === -1 || toIdx === -1) return;

  // Reorder in the main tasks array
  const fromTask = scheduled[fromIdx];
  const toTask = scheduled[toIdx];
  const fromMainIdx = tasks.indexOf(fromTask);
  const toMainIdx = tasks.indexOf(toTask);
  tasks.splice(fromMainIdx, 1);
  const newToIdx = tasks.indexOf(toTask);
  tasks.splice(fromMainIdx < toMainIdx ? newToIdx + 1 : newToIdx, 0, fromTask);

  dragId = null;
  save();
  render();
}

// ---- Render ----
function render() {
  const scheduled = tasks.filter(t => t.status === 'scheduled');
  const backlog = tasks.filter(t => t.status === 'backlog');
  const completed = tasks.filter(t => t.status === 'completed').sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));

  document.getElementById('scheduled-count').textContent = scheduled.length;
  document.getElementById('backlog-count').textContent = backlog.length;
  document.getElementById('completed-count').textContent = completed.length;

  // Stats
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayCompleted = completed.filter(t => t.completedAt && t.completedAt >= todayStart.getTime());
  const totalMinutes = Math.floor(todayCompleted.reduce((s, t) => s + (t.timeSpent || 0), 0) / 60);
  // Also count currently running timer
  const activeTime = activeTaskId ? timerElapsed : 0;
  const totalWithActive = totalMinutes + Math.floor(activeTime / 60);
  const h = Math.floor(totalWithActive / 60);
  const m = totalWithActive % 60;
  document.getElementById('stat-total').textContent = `${h}h ${m}m`;
  document.getElementById('stat-done').textContent = todayCompleted.length;

  renderList('scheduled-list', scheduled, 'scheduled');
  renderList('backlog-list', backlog, 'backlog');
  renderList('completed-list', completed, 'completed');
}

function renderList(containerId, items, section) {
  const el = document.getElementById(containerId);
  if (!items.length) {
    el.innerHTML = `<div class="empty-state">${section === 'scheduled' ? 'No tasks scheduled. Add one above.' : section === 'backlog' ? 'Backlog is empty.' : 'No completed tasks yet.'}</div>`;
    return;
  }

  el.innerHTML = items.map(t => {
    const isRunning = t.id === activeTaskId;
    const isBreak = t.type === 'break';
    const notesOpen = openNotesIds.has(t.id);
    const wrapperClasses = ['task-card-wrapper', isRunning && 'running', isBreak && 'is-break', section === 'completed' && 'completed-card', notesOpen && 'notes-open'].filter(Boolean).join(' ');
    const classes = 'task-card';

    const timeSpentStr = t.timeSpent > 0 ? formatTime(t.timeSpent) : '';
    const badge = section === 'completed'
      ? (timeSpentStr || `${t.minutes}m`)
      : `${t.minutes}m${timeSpentStr ? ' / ' + timeSpentStr : ''}`;

    const notesBtn = `<button onclick="toggleNotes('${t.id}')" title="Notes">${notesOpen ? 'Hide' : 'Notes'}</button>`;
    let actions = '';
    if (section === 'scheduled') {
      actions = isRunning
        ? notesBtn
        : `<button onclick="startTimer('${t.id}')">${isBreak ? 'Start' : 'Start'}</button>
           <button class="complete-btn" onclick="completeTask('${t.id}')">Done</button>
           ${notesBtn}
           <button onclick="moveToBacklog('${t.id}')">Backlog</button>
           <button class="danger" onclick="deleteTask('${t.id}')">Del</button>`;
    } else if (section === 'backlog') {
      actions = `<button onclick="moveToScheduled('${t.id}')">Schedule</button>
                 ${notesBtn}
                 <button class="danger" onclick="deleteTask('${t.id}')">Del</button>`;
    } else {
      actions = `<button onclick="uncompleteTask('${t.id}')">Undo</button>
                 ${notesBtn}
                 <button class="danger" onclick="deleteTask('${t.id}')">Del</button>`;
    }

    const notesIndicator = (t.notes && t.notes.trim()) ? '<span class="notes-indicator" title="Has notes">●</span>' : '';

    const draggable = section === 'scheduled' ? `draggable="true" ondragstart="onDragStart(event,'${t.id}')" ondragend="onDragEnd(event)" ondragover="onDragOver(event,'${t.id}')" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${t.id}')"` : '';

    const canEdit = section !== 'completed';
    const nameClick = canEdit ? `onclick="editTaskName('${t.id}', this)"` : '';
    const timeClick = canEdit ? `onclick="editTaskTime('${t.id}', this)"` : '';

    return `<div class="${wrapperClasses}">
      <div class="${classes}" ${draggable}>
        ${section === 'scheduled' ? '<span class="drag-handle">&#9776;</span>' : ''}
        <div class="task-info">
          <div class="task-name" ${nameClick}>${escHtml(t.name)}${notesIndicator}</div>
          <div class="task-meta">
            <span>${isBreak ? 'Break' : 'Task'}</span>
            ${section === 'completed' && t.completedAt ? `<span>${new Date(t.completedAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>` : ''}
          </div>
        </div>
        <div class="task-time-badge" ${timeClick} title="${canEdit ? 'Click to edit time' : ''}">${badge}</div>
        <div class="task-actions">${actions}</div>
      </div>
      <div class="task-notes-drawer">
        <textarea id="notes-${t.id}" placeholder="Add notes for this task..." oninput="updateNotes('${t.id}', this.value)" onmousedown="event.stopPropagation()">${escHtml(t.notes || '')}</textarea>
      </div>
    </div>`;
  }).join('');
}

// ---- Helpers ----
function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function toggleCompleted() {
  showCompleted = !showCompleted;
  document.getElementById('completed-list').style.display = showCompleted ? 'flex' : 'none';
  document.getElementById('completed-arrow').textContent = showCompleted ? '-' : '+';
}

// ---- Init ----
render();
</script>
</body>
</html>
